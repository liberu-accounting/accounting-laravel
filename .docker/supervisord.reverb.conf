[program:reverb]
process_name=%(program_name)s
command=php %(ENV_ROOT)s/artisan reverb:start --no-interaction
autostart=%(ENV_WITH_REVERB)s
autorestart=true
stopasgroup=true
killasgroup=true
user=%(ENV_USER)s
redirect_stderr=true
stdout_logfile=%(ENV_ROOT)s/storage/logs/reverb.log
stdout_logfile_maxbytes=10MB
stopwaitsecs=3600
