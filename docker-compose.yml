services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: '8.3'
    image: liberu/accounting:latest
    restart: unless-stopped
    environment:
      CONTAINER_MODE: http
      OCTANE_SERVER: swoole
      APP_ENV: production
      APP_DEBUG: false
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-liberu}
      DB_USERNAME: ${DB_USERNAME:-liberu}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUNNING_MIGRATIONS_AND_SEEDERS: "false"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - storage:/var/www/html/storage/app
      - logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - liberu

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: '8.3'
    image: liberu/accounting:latest
    restart: unless-stopped
    environment:
      CONTAINER_MODE: horizon
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-liberu}
      DB_USERNAME: ${DB_USERNAME:-liberu}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - storage:/var/www/html/storage/app
      - logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - liberu

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: '8.3'
    image: liberu/accounting:latest
    restart: unless-stopped
    environment:
      CONTAINER_MODE: scheduler
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-liberu}
      DB_USERNAME: ${DB_USERNAME:-liberu}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - storage:/var/www/html/storage/app
      - logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - liberu

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-liberu}
      MYSQL_USER: ${DB_USERNAME:-liberu}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - liberu

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
    networks:
      - liberu

volumes:
  mysql:
  redis:
  storage:
  logs:

networks:
  liberu:
    driver: bridge
