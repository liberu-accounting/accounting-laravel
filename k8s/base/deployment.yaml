apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounting-app
  namespace: accounting
  labels:
    app: accounting-laravel
    component: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accounting-laravel
      component: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: accounting-laravel
        component: application
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z accounting-mysql 3306; do echo waiting for mysql; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
        - name: migrations
          image: accounting-laravel:latest
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan event:cache']
          envFrom:
            - configMapRef:
                name: accounting-config
            - secretRef:
                name: accounting-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: app
          image: accounting-laravel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: accounting-config
            - secretRef:
                name: accounting-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: storage
              mountPath: /var/www/html/storage/app
          startupProbe:
            httpGet:
              path: /up
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /up
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: accounting-storage
