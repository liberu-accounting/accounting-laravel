apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: accounting-network-policy
  namespace: accounting
  labels:
    app: accounting-laravel
spec:
  podSelector:
    matchLabels:
      app: accounting-laravel
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: accounting-laravel
      ports:
        - port: 8000
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: accounting-laravel
    - ports:
        - port: 53
          protocol: UDP
        - port: 443
        - port: 80
