apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounting-redis
  namespace: accounting
  labels:
    app: accounting-laravel
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounting-laravel
      component: cache
  template:
    metadata:
      labels:
        app: accounting-laravel
        component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
          readinessProbe:
            exec:
              command: ['redis-cli', 'ping']
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: accounting-redis
  namespace: accounting
  labels:
    app: accounting-laravel
    component: cache
spec:
  type: ClusterIP
  selector:
    app: accounting-laravel
    component: cache
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
