apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: accounting-app
  - patch: |-
      - op: replace
        path: /data/APP_ENV
        value: local
      - op: replace
        path: /data/APP_DEBUG
        value: "true"
      - op: replace
        path: /data/LOG_LEVEL
        value: debug
    target:
      kind: ConfigMap
      name: accounting-config
